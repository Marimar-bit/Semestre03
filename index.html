<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Financiera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">

    <h2 class="text-center">Gestión Financiera</h2>

    <!-- Login -->
    <div id="login">
        <input type="text" id="username" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="password" class="form-control mb-2" placeholder="Contraseña">
        <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
    </div>

    <!-- Botón para ir al registro -->
    <div class="mt-3 text-center">
        <button class="btn btn-link" onclick="toggleRegister(true)">Crear cuenta</button>
    </div>

    <!-- Formulario de registro -->
    <div id="register" class="d-none mt-4">
        <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email">
        <input type="text" id="regUsername" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="regPassword" class="form-control mb-2" placeholder="Contraseña">
        <button class="btn btn-success w-100" onclick="register()">Registrarse</button>

        <div class="text-center mt-2">
            <button class="btn btn-link" onclick="toggleRegister(false)">Volver al login</button>
        </div>
    </div>

    <!-- Aplicación principal -->
    <div id="app" class="d-none">
  <h4>Nuevo Movimiento</h4>
  <input type="number" id="amount" class="form-control mb-2" placeholder="Monto">
  <select id="type" class="form-control mb-2">
    <option value="ingreso">Ingreso</option>
    <option value="gasto">Gasto</option>
  </select>
  <select id="category" class="form-control mb-2">
    <option value="">Selecciona categoría</option>
  </select>
  <button class="btn btn-success" onclick="addTransaction()">Agregar</button>

  <hr>
  <h5>Filtros</h5>
  <div class="row g-2 align-items-end mb-2">
    <div class="col-md-6">
      <input type="date" id="filterFrom" class="form-control" placeholder="Desde">
    </div>
    <div class="col-md-6">
      <input type="date" id="filterTo" class="form-control" placeholder="Hasta">
    </div>
    <div class="col-md-12 mt-2">
      <select id="filterCategory" class="form-control">
        <option value="">Todas las categorías</option>
      </select>
    </div>
  </div>
  <button class="btn btn-primary mb-3" onclick="render()">Aplicar Filtros</button>

  <h5 class="mt-4">Balance: <span id="balance">0</span></h5>
  <ul id="transactions" class="list-group mt-3"></ul>
</div>

</div>

<script src="app.js"></script>
