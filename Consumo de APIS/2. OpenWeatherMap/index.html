<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="/2. OpenWeatherMap/style.css">
</head>
<body>
    <!-- #contenedor de la app -->
    <div class="card">
        <div class="search-bar">
        <input type="text" placeholder="Enter the city.." spellcheck="false" id="input-box">
        <button id="search-btn"><img src="/2. OpenWeatherMap/images/search.png" alt=""></button>
    </div>
    
    <div class="error">
        <p>City name not found</p>
    </div>
    <div class="weather" id="weather"> 
        <img src="/2. OpenWeatherMap/images/rain.png" alt="" class="weather-icon">
        <h1 class="temperature">25°C</h1>
        <h2 class="city">Medellin</h2>
        <div class="details">
    <div class="col">
        <img src="/2. OpenWeatherMap/images/humidity.png" alt="">
        <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
        </div>
    </div>

    <div class="col">
        <img src="/2. OpenWeatherMap/images/wind.png" alt="">
        <div>
            <p class="wind">10 km/h</p>
            <p>Wind Speed</p>
        </div>
    </div>
</div>
<script src="/2. OpenWeatherMap/script.js"></script>
</body>
</html>
