<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería con Fetch</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>📸 Galería de Imágenes</h1>
    <div class="galeria" id="galeria"></div>

    <script src="galeria.js"></script>
</body>
</html>
